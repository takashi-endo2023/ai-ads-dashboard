name: Deploy to AWS

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  deploy-backend:
    name: Build & Deploy Backend (Lambda)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        working-directory: backend
        run: npm run build

      - name: Package Lambda zip
        run: |
          mkdir /tmp/lambda
          cp -r backend/dist /tmp/lambda/
          cp backend/package.json /tmp/lambda/
          cd /tmp/lambda && npm install --omit=dev
          cd /tmp/lambda && zip -r $GITHUB_WORKSPACE/function.zip dist/ node_modules/

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ap-northeast-1

      - name: Update Lambda function code
        run: |
          aws lambda update-function-code \
            --function-name ${{ secrets.AI_ADS_LAMBDA_NAME }} \
            --zip-file fileb://function.zip

      - name: Wait for Lambda update
        run: |
          aws lambda wait function-updated \
            --function-name ${{ secrets.AI_ADS_LAMBDA_NAME }}

      - name: Update Lambda environment variables
        run: |
          aws lambda update-function-configuration \
            --function-name ${{ secrets.AI_ADS_LAMBDA_NAME }} \
            --environment "Variables={GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}}"

  deploy-frontend:
    name: Build & Deploy Frontend (S3 + CloudFront)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        working-directory: frontend
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: ${{ secrets.AI_ADS_API_URL }}

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ap-northeast-1

      - name: Deploy static assets (_next/static → 1年 immutable)
        run: |
          aws s3 sync frontend/out/_next/static \
            "s3://${{ secrets.AI_ADS_S3_BUCKET }}/_next/static" \
            --cache-control "max-age=31536000,immutable" \
            --delete

      - name: Deploy other assets (画像・フォント → 1日キャッシュ)
        run: |
          aws s3 sync frontend/out/ \
            "s3://${{ secrets.AI_ADS_S3_BUCKET }}/" \
            --cache-control "max-age=86400" \
            --exclude "*.html" \
            --exclude "_next/static/*" \
            --delete

      - name: Deploy HTML (no-cache)
        run: |
          aws s3 sync frontend/out/ \
            "s3://${{ secrets.AI_ADS_S3_BUCKET }}/" \
            --cache-control "max-age=0,no-cache" \
            --exclude "*" \
            --include "*.html" \
            --delete

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id "${{ secrets.AI_ADS_CLOUDFRONT_DISTRIBUTION_ID }}" \
            --paths "/*"
